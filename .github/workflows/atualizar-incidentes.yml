name: Atualizar Dashboard de Incidentes

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Buscar incidentes do Jira
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python << 'EOF'
          import requests
          from requests.auth import HTTPBasicAuth
          import json
          import os
          from datetime import datetime

          JIRA_URL = os.environ['JIRA_URL']
          JIRA_EMAIL = os.environ['JIRA_EMAIL']
          JIRA_API_TOKEN = os.environ['JIRA_API_TOKEN']

          auth = HTTPBasicAuth(JIRA_EMAIL, JIRA_API_TOKEN)
          headers = {'Accept': 'application/json', 'Content-Type': 'application/json'}

          jql = 'project = OFBI AND issuetype = "[System] Incidente" AND (created >= -90d OR updated >= -90d) ORDER BY created DESC'

          payload = {
              'jql': jql,
              'fields': ['summary', 'status', 'created', 'updated', 'assignee', 'reporter', 'priority', 'labels', 'resolutiondate'],
              'maxResults': 100
          }

          print('Buscando incidentes do Jira...')
          response = requests.post(
              f'{JIRA_URL}/rest/api/3/search/jql',
              auth=auth,
              headers=headers,
              json=payload,
              timeout=30
          )

          if response.status_code == 200:
              data = response.json()
              issues = data.get('issues', [])

              incidentes = []
              for issue in issues:
                  key = issue.get('key')
                  fields = issue.get('fields', {})

                  assignee = fields.get('assignee') or {}
                  reporter = fields.get('reporter') or {}
                  priority = fields.get('priority') or {}
                  status = fields.get('status') or {}

                  incidentes.append({
                      'key': key,
                      'summary': fields.get('summary', ''),
                      'status': status.get('name', ''),
                      'priority': priority.get('name', ''),
                      'assignee': assignee.get('displayName', 'Sem responsável'),
                      'reporter': reporter.get('displayName', ''),
                      'created': fields.get('created', ''),
                      'updated': fields.get('updated', ''),
                      'resolutiondate': fields.get('resolutiondate', None),
                      'labels': fields.get('labels', []),
                  })

              output = {
                  'ultima_atualizacao': datetime.now().isoformat(),
                  'total': len(incidentes),
                  'incidentes': incidentes
              }

              with open('dados-incidentes.json', 'w', encoding='utf-8') as f:
                  json.dump(output, f, ensure_ascii=False, indent=2)

              print(f'✓ {len(incidentes)} incidentes exportados para dados-incidentes.json')
          else:
              print(f'✗ Erro: {response.status_code}')
              print(response.text)
              exit(1)
          EOF

      - name: Commit e Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dados-incidentes.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizar dados do dashboard de incidentes [skip ci]" && git push)
