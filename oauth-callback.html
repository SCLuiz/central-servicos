<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticando... - Central de Serviços</title>
    <link rel="stylesheet" href="login.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .callback-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #DFE1E6;
            border-top-color: #0052CC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { color: #172B4D; margin-bottom: 12px; }
        p { color: #5E6C84; font-size: 14px; }
        .error { color: #DE350B; }
    </style>
</head>
<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h2 id="status">Autenticando...</h2>
        <p id="message">Processando login com Jira</p>
    </div>

    <script src="oauth-config.js"></script>
    <script>
        const WORKER_URL = 'https://oauth-token-exchange.luiz-santos.workers.dev';
        const OFB_CLOUD_ID = '833a5b89-ffad-428e-9374-e8478ba01f4a';
        const OFB_EMAIL_DOMAIN = '@openfinancebrasil.org.br';
    </script>
    <script>
        async function handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');

            if (error) {
                showError('Erro na autenticação: ' + error);
                return;
            }

            if (!code) {
                showError('Código de autorização não encontrado');
                return;
            }

            try {
                // Passo 1 — Troca o code pelo access_token
                document.getElementById('message').textContent = 'Obtendo token de acesso...';
                const tokenData = await exchangeCodeForToken(code);

                // Passo 2 — Valida Cloud ID (usuário tem acesso ao Jira da OFB?)
                document.getElementById('message').textContent = 'Verificando acesso à organização...';
                const cloudId = await getAndValidateCloudId(tokenData.access_token);

                // Passo 3 — Obtém dados do usuário e valida domínio de e-mail
                document.getElementById('message').textContent = 'Verificando identidade...';
                const userInfo = await getAndValidateUserInfo(tokenData.access_token, cloudId);

                // Passo 4 — Tudo validado, salva sessão
                localStorage.setItem('oauth_access_token', tokenData.access_token);
                localStorage.setItem('oauth_refresh_token', tokenData.refresh_token);
                localStorage.setItem('oauth_expires_at', Date.now() + (tokenData.expires_in * 1000));
                localStorage.setItem('oauth_cloud_id', cloudId);
                localStorage.setItem('isAuthenticated', 'true');
                localStorage.setItem('userName', userInfo.displayName || userInfo.emailAddress);
                localStorage.setItem('userEmail', userInfo.emailAddress);
                localStorage.setItem('userAvatar', userInfo.avatarUrls ? userInfo.avatarUrls['48x48'] : '');
                localStorage.setItem('authMethod', 'oauth');

                document.getElementById('status').textContent = '✅ Autenticado!';
                document.getElementById('message').textContent = 'Bem-vindo(a), ' + userInfo.displayName + '! Redirecionando...';

                setTimeout(() => { window.location.href = 'index.html'; }, 1500);

            } catch (error) {
                console.error('Erro OAuth:', error);
                showError(error.message);
            }
        }

        async function exchangeCodeForToken(code) {
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, redirect_uri: OAUTH_CONFIG.redirectUri })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Falha ao obter token: ' + response.status);
            }

            return await response.json();
        }

        async function getAndValidateCloudId(accessToken) {
            const response = await fetch('https://api.atlassian.com/oauth/token/accessible-resources', {
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Accept': 'application/json' }
            });

            if (!response.ok) {
                throw new Error('Falha ao verificar recursos Atlassian');
            }

            const resources = await response.json();

            if (!resources || resources.length === 0) {
                throw new Error('Acesso negado: nenhum recurso Atlassian encontrado para este usuário');
            }

            // Validação 2: verifica se o usuário tem acesso ao site da Open Finance Brasil
            const ofbResource = resources.find(r => r.id === OFB_CLOUD_ID);
            if (!ofbResource) {
                throw new Error('Acesso negado: você não tem acesso ao Jira da Open Finance Brasil');
            }

            return ofbResource.id;
        }

        async function getAndValidateUserInfo(accessToken, cloudId) {
            const response = await fetch(`https://api.atlassian.com/ex/jira/${cloudId}/rest/api/3/myself`, {
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Accept': 'application/json' }
            });

            if (!response.ok) {
                throw new Error('Falha ao obter informações do usuário');
            }

            const userInfo = await response.json();

            // Validação 1: verifica se o e-mail pertence ao domínio da Open Finance Brasil
            const email = (userInfo.emailAddress || '').toLowerCase();
            if (!email.endsWith(OFB_EMAIL_DOMAIN)) {
                throw new Error('Acesso negado: este portal é restrito a funcionários da Open Finance Brasil (' + OFB_EMAIL_DOMAIN + ')');
            }

            return userInfo;
        }

        function showError(message) {
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('status').textContent = '❌ Acesso Negado';
            document.getElementById('status').className = 'error';
            document.getElementById('message').textContent = message;
            document.getElementById('message').className = 'error';
            setTimeout(() => { window.location.href = 'login.html'; }, 5000);
        }

        handleOAuthCallback();
    </script>
</body>
</html>
